<script>
// Navigation
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
    this.classList.add('active');
    var activeModule = document.getElementById('module-' + this.dataset.module);
    activeModule.classList.add('active');
    // Trigger resize in iframes so fixed-size pages can re-scale
    setTimeout(function(){
      var iframes = activeModule.querySelectorAll('iframe');
      for(var i=0;i<iframes.length;i++){
        try{ iframes[i].contentWindow.dispatchEvent(new Event('resize')); }catch(e){}
      }
      window.dispatchEvent(new Event('resize'));
    },100);
  });
});

// Clock
function updateClock(){
  var n=new Date(),p=function(x){return String(x).padStart(2,'0')};
  document.getElementById('navClock').textContent=n.getFullYear()+'-'+p(n.getMonth()+1)+'-'+p(n.getDate())+' '+p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
}
updateClock();
setInterval(updateClock,1000);
</script>
